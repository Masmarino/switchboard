name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GTK4/libadwaita dev packages (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - name: cargo test (Linux, all crates)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p switchboard-core -p switchboard-ffi -p switchboard-linux
      - name: cargo test (macOS, no GTK)
        if: matrix.os == 'macos-26'
        run: cargo test -p switchboard-core -p switchboard-ffi

  build-macos-app:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Select latest available Xcode (Package.swift needs Swift tools 6.0+)
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
      - run: cargo build -p switchboard-ffi --release
      - working-directory: macos
        run: swift build -c release
