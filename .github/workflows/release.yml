name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-26
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Determine version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0-dev" >> "$GITHUB_ENV"
          fi
      - name: Select latest available Xcode (Package.swift needs Swift tools 6.0+)
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
      - name: Build FFI (release)
        run: cargo build -p switchboard-ffi --release
      - name: Build SwiftUI app
        working-directory: macos
        run: swift build -c release
      - name: Assemble .app bundle
        run: |
          APP="Switchboard.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp macos/.build/release/Switchboard "$APP/Contents/MacOS/"
          cp icons/icon.icns "$APP/Contents/Resources/icon.icns"
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Switchboard</string>
            <key>CFBundleIdentifier</key><string>com.skolln.switchboard</string>
            <key>CFBundleName</key><string>Switchboard</string>
            <key>CFBundleIconFile</key><string>icon.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${{ env.VERSION }}</string>
            <key>CFBundleVersion</key><string>${{ env.VERSION }}</string>
            <key>LSMinimumSystemVersion</key><string>15.0</string>
          </dict>
          </plist>
          EOF
      - name: Import signing certificate
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
      - name: Code sign app bundle
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        run: codesign --deep --force --options runtime --timestamp --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" Switchboard.app
      - name: Create .dmg (drag-to-Applications layout)
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Switchboard" \
            --background "icons/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Switchboard.app" 180 195 \
            --hide-extension "Switchboard.app" \
            --app-drop-link 480 195 \
            --no-internet-enable \
            "Switchboard-${{ env.VERSION }}-macos.dmg" \
            "Switchboard.app" || true
          test -f "Switchboard-${{ env.VERSION }}-macos.dmg"
      - name: Sign, notarize and staple .dmg
        if: ${{ env.HAS_APPLE_CERT == 'true' }}
        run: |
          codesign --force --timestamp --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "Switchboard-${{ env.VERSION }}-macos.dmg"
          xcrun notarytool submit "Switchboard-${{ env.VERSION }}-macos.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple "Switchboard-${{ env.VERSION }}-macos.dmg"
      - uses: actions/upload-artifact@v7
        with:
          name: switchboard-macos
          path: Switchboard-${{ env.VERSION }}-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Determine version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0-dev" >> "$GITHUB_ENV"
          fi
      - name: Build FFI (release)
        run: cargo build -p switchboard-ffi --release
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Publish WinUI3 app
        working-directory: windows
        run: dotnet publish Switchboard.csproj -c Release -r win-x64 --self-contained -p:WindowsPackageType=None -p:Version=${{ env.VERSION }}
      - name: Stage artifacts
        shell: pwsh
        run: |
          $publishDir = Get-ChildItem -Path "windows\bin" -Recurse -Directory -Filter "publish" | Where-Object { $_.FullName -match "win-x64" } | Select-Object -First 1
          $out = "switchboard-windows"
          New-Item -ItemType Directory -Force -Path $out
          Copy-Item "$($publishDir.FullName)\*" $out -Recurse
          Copy-Item "target\release\switchboard_ffi.dll" $out
          Copy-Item "icons\icon.ico" $out
          Compress-Archive -Path "$out\*" -DestinationPath "switchboard-${{ env.VERSION }}-windows.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: switchboard-windows
          path: switchboard-${{ env.VERSION }}-windows.zip
      - name: Download Visual C++ Redistributable
        shell: pwsh
        run: Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "windows\vc_redist.x64.exe"
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ env.VERSION }}" windows\installer.iss
      - uses: actions/upload-artifact@v7
        with:
          name: switchboard-windows-installer
          path: windows\Switchboard-${{ env.VERSION }}-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Determine version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0-dev" >> "$GITHUB_ENV"
          fi
      - name: Install GTK4/libadwaita dev packages
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - name: Build Linux frontend (release)
        run: cargo build -p switchboard-linux --release
      - name: Stage tarball
        run: |
          mkdir -p switchboard-linux/bin
          cp target/release/switchboard switchboard-linux/bin/
          cp -r icons switchboard-linux/
          cp linux/com.skolln.switchboard.desktop linux/install.sh switchboard-linux/
          chmod +x switchboard-linux/install.sh
          cp README.md LICENSE switchboard-linux/
          tar -czf "switchboard-${{ env.VERSION }}-linux.tar.gz" switchboard-linux
      - uses: actions/upload-artifact@v7
        with:
          name: switchboard-linux
          path: switchboard-${{ env.VERSION }}-linux.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum switchboard-macos/*.dmg switchboard-windows/*.zip switchboard-windows-installer/*.exe switchboard-linux/*.tar.gz > checksums.txt
          cat checksums.txt
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/switchboard-macos/*.dmg
            artifacts/switchboard-windows/*.zip
            artifacts/switchboard-windows-installer/*.exe
            artifacts/switchboard-linux/*.tar.gz
            artifacts/checksums.txt
